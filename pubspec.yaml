name: dart_red
description: Flow-based runtime engine, HTTP client, and flow editor for the Rubix platform.
version: 0.1.0
publish_to: none

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # HTTP / networking
  dio: ^5.4.3+1
  shelf: ^1.4.2
  shelf_router: ^1.1.4

  # State management
  flutter_riverpod: ^2.5.1

  # Flow editor canvas
  fl_nodes: ^0.5.0+1

  # Icons
  lucide_icons: ^0.257.0

  # Database / persistence
  drift: ^2.22.1
  drift_flutter: ^0.2.7

  # Serial / USB (used by modbus driver and serial nodes)
  flutter_libserialport: ^0.6.0
  usb_serial: ^0.5.2

  # MQTT
  mqtt5_client: ^4.5.0
  mqtt_server: ^2.0.0

  # Utilities
  uuid: ^4.4.0
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0
  path_provider: ^2.1.5
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.2.2

  # BACnet protocol stack (sibling repo — switch to git ref for releases)
  bacnet_dart:
    path: ../bacnet-dart

  # Shared UI components (from rubixapp monorepo — update once extracted)
  rubix_ui:
    path: ../rubixapp/packages/rubix_ui

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.9
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  drift_dev: ^2.22.1
